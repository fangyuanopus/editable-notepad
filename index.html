<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <title>扫码验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f7f7f7;
            color: #333;
            max-width: 750px;
            margin: 0 auto;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        /* 顶部标题栏 */
        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 16px 12px;
            background: #fff;
        }
        .back-arrow {
            position: absolute;
            left: 12px;
            font-size: 22px;
            color: #333;
            text-decoration: none;
        }
        .header-title {
            font-size: 20px;
            font-weight: 500;
        }
        /* 校徽+标题区域 */
        .logo-section {
            background: #fff;
            padding: 20px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .logo-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid #d61f27;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d61f27;
            font-weight: bold;
            font-size: 26px;
        }
        .logo-text {
            font-size: 26px;
            font-weight: 600;
            color: #222;
        }
        /* 图书馆横幅图占位 */
        .banner-img {
            width: 100%;
            height: 160px;
            background: #c9c9c9;
            background-image: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0.1)), url("https://picsum.photos/id/1060/750/160");
            background-size: cover;
            background-position: center;
        }
        /* 查询结果卡片容器 */
        .result-card {
            margin: 20px 12px;
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
        }
        /* 卡片头部蓝色栏 */
        .card-header {
            background-color: #30469c;
            color: #fff;
            padding: 12px 16px;
            font-size: 17px;
            font-weight: 500;
        }
        /* 表格行样式 */
        .table-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            border-bottom: 1px solid #eee;
        }
        .table-row:last-of-type {
            border-bottom: none;
        }
        .table-label {
            padding: 14px 16px;
            background: #fafafa;
            font-size: 16px;
            color: #444;
        }
        .table-value {
            padding: 14px 16px;
            font-size: 16px;
            color: #222;
        }
        /* 数据核实区域（带水印预览图） */
        .data-preview {
            padding: 16px;
            background: #fafafa;
            display: flex;
            justify-content: center;
        }
        .preview-paper {
            width: 90%;
            height: 320px;
            background: #fff;
            position: relative;
            border: 1px solid #ddd;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 斜向水印文字 — 仅供内容预览核验 */
        .watermark {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .watermark-text {
            position: absolute;
            top: -60%;
            left: -30%;
            width: 160%;
            height: 220%;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 50px 60px;
            transform: rotate(-30deg);
            color: rgba(180,180,180,0.18);
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 8px;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }
        .watermark-text span {
            display: inline-block;
        }
        .paper-content {
            position: relative;
            z-index: 2;
            width: 90%;
            height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }
        .paper-seal {
            width: 70px;
            height: 70px;
            border: 2px solid #d61f27;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d61f27;
            font-size: 12px;
            text-align: center;
        }
        .paper-qrcode {
            width: 40px;
            height: 40px;
            background: #333;
        }
        /* 查询通过绿色提示 */
        .success-row .table-value {
            color: #009944;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .success-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00bb55;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }
        /* 查询失败红色提示 */
        .fail-row .table-value {
            color: #d61f27;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fail-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #d61f27;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
        }
        /* 加载中 */
        .loading-text {
            color: #999 !important;
        }
        /* 底部联系电话 */
        .tel-tip {
            text-align: center;
            padding: 16px 12px;
            font-size: 16px;
            color: #222;
        }
        /* 页面最底部技术支持文字 */
        .footer-tech {
            text-align: center;
            padding: 24px 12px;
            font-size: 15px;
            color: #777;
        }
        /* 移动端适配 */
        @media (max-width: 480px) {
            .header-title { font-size: 18px; }
            .logo-circle { width: 52px; height: 52px; font-size: 22px; }
            .logo-text { font-size: 22px; }
            .banner-img { height: 120px; }
            .table-row { grid-template-columns: 100px 1fr; }
            .table-label { padding: 12px 10px; font-size: 14px; }
            .table-value { padding: 12px 10px; font-size: 14px; }
            .preview-paper { width: 100%; height: 240px; }
            .card-header { font-size: 15px; padding: 10px 14px; }
            .tel-tip { font-size: 14px; }
            .footer-tech { font-size: 13px; }
            .watermark-text { font-size: 15px; gap: 35px 40px; }
        }
    </style>
</head>
<body>
    <!-- 顶部返回+标题 -->
    <div class="header-top">
        <a href="javascript:history.back();" class="back-arrow">&lt;</a>
        <div class="header-title">扫码验证</div>
    </div>

    <!-- 校徽+校级防伪验证中心标题 -->
    <div class="logo-section">
        <div class="logo-circle">福</div>
        <div class="logo-text">校级防伪验证中心</div>
    </div>

    <!-- 图书馆横幅图片 -->
    <div class="banner-img"></div>

    <!-- 主查询结果卡片 -->
    <div class="result-card">
        <div class="card-header">查询结果</div>

        <div class="table-row">
            <div class="table-label">文件编号</div>
            <div class="table-value" id="val-fileNo">----</div>
        </div>
        <div class="table-row">
            <div class="table-label">文件名称</div>
            <div class="table-value" id="val-fileName">----</div>
        </div>
        <div class="table-row">
            <div class="table-label">打印日期</div>
            <div class="table-value" id="val-printDate">----</div>
        </div>
        <div class="table-row">
            <div class="table-label">学生姓名</div>
            <div class="table-value" id="val-studentName">----</div>
        </div>
        <div class="table-row">
            <div class="table-label">学工号</div>
            <div class="table-value" id="val-studentId">----</div>
        </div>

        <!-- 数据核实预览区域 -->
        <div class="table-row">
            <div class="table-label">数据核实</div>
            <div class="data-preview">
                <div class="preview-paper" id="previewPaper">
                    <!-- 斜向水印文字：仅供内容预览核验 -->
                    <div class="watermark">
                        <div class="watermark-text" id="watermarkText"></div>
                    </div>
                    <div class="paper-content">
                        <div style="text-align:center; font-size:12px; color:#333;">
                            <div id="previewCollege">福州大学</div>
                            <div id="previewDocType">在编在岗证明</div>
                        </div>
                        <div class="paper-seal">校章</div>
                        <div class="paper-qrcode"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 查询结果行（动态切换成功/失败/加载中） -->
        <div class="table-row success-row" id="resultRow">
            <div class="table-label">查询结果</div>
            <div class="table-value" id="resultText">
                <span class="success-dot" id="resultIcon">✓</span>
                <span id="resultMsg">正在查询，请稍候…</span>
            </div>
        </div>
    </div>

    <!-- 联系电话提示 -->
    <div class="tel-tip">进一步核实，请拨打电话 0591-22865284</div>

    <!-- 页面底部技术支持 -->
    <div class="footer-tech">技术支持：信息中心</div>

    <script>
    (function() {
        'use strict';

        // ==================== 配置 ====================
        // 后端 API 地址：请替换为实际接口
        var API_BASE = 'https://your-api-server.com/api';
        var VERIFY_ENDPOINT = API_BASE + '/verify';

        // ==================== 水印生成 ====================
        function generateWatermark() {
            var container = document.getElementById('watermarkText');
            var text = '仅供内容预览核验';
            var html = '';
            // 生成一个 10×12 的网格，铺满预览区域
            for (var row = 0; row < 12; row++) {
                for (var col = 0; col < 10; col++) {
                    html += '<span>' + text + '</span>';
                }
            }
            container.innerHTML = html;
        }
        generateWatermark();

        // ==================== 获取 URL 参数 ====================
        function getQueryParam(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name) || '';
        }

        // ==================== 填充表格数据 ====================
        function fillTable(data) {
            document.getElementById('val-fileNo').textContent     = data.fileNo      || '----';
            document.getElementById('val-fileName').textContent   = data.fileName    || '----';
            document.getElementById('val-printDate').textContent  = data.printDate   || '----';
            document.getElementById('val-studentName').textContent = data.studentName || '----';
            document.getElementById('val-studentId').textContent  = data.studentId   || '----';
            // 预览区域
            if (data.college)    document.getElementById('previewCollege').textContent = data.college;
            if (data.docType)    document.getElementById('previewDocType').textContent = data.docType;
        }

        // ==================== 设置查询结果状态 ====================
        function setResultStatus(status, message) {
            var row = document.getElementById('resultRow');
            var icon = document.getElementById('resultIcon');
            var msg = document.getElementById('resultMsg');

            row.classList.remove('success-row', 'fail-row');

            if (status === 'success') {
                row.classList.add('success-row');
                icon.className = 'success-dot';
                icon.textContent = '✓';
                msg.textContent = message || '查询通过，请进一步核对文件内容信息。';
            } else if (status === 'fail') {
                row.classList.add('fail-row');
                icon.className = 'fail-dot';
                icon.textContent = '✗';
                msg.textContent = message || '查询未通过，未找到对应文件信息。';
            } else if (status === 'loading') {
                icon.className = 'success-dot';
                icon.style.background = '#999';
                icon.textContent = '…';
                msg.textContent = message || '正在查询，请稍候…';
                msg.style.color = '#999';
            }
        }

        // ==================== 调用后端 API ====================
        async function queryVerifyData(queryCode) {
            if (!queryCode) {
                setResultStatus('fail', '缺少查询参数，请通过正规渠道扫码访问。');
                return;
            }

            setResultStatus('loading');

            try {
                var response = await fetch(VERIFY_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        code: queryCode,
                        timestamp: Date.now()
                    })
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                var result = await response.json();

                if (result.success && result.data) {
                    fillTable(result.data);
                    setResultStatus('success', result.message || '查询通过，请进一步核对文件内容信息。');
                } else {
                    fillTable({});
                    setResultStatus('fail', result.message || '查询未通过，未找到对应文件信息。');
                }
            } catch (err) {
                console.error('API 请求失败:', err);
                // 如果后端不可达，尝试使用模拟数据演示
                if (API_BASE.indexOf('your-api-server') !== -1) {
                    // 演示模式：使用 URL 参数模拟数据回填
                    fillWithDemoData(queryCode);
                } else {
                    fillTable({});
                    setResultStatus('fail', '网络请求失败，请稍后重试。');
                }
            }
        }

        // ==================== 演示模式（后端未配置时自动启用） ====================
        function fillWithDemoData(code) {
            // 模拟 API 返回的数据（实际部署后删除此函数）
            fillTable({
                fileNo:      code || '202610032775',
                fileName:    '在编在岗证明',
                printDate:   '2026-06-05 17:51:22',
                studentName: '陈纾',
                studentId:   'T07097',
                college:     '福州大学',
                docType:     '在编在岗证明'
            });
            setResultStatus('success', '查询通过，请进一步核对文件内容信息。(演示模式)');
            console.warn('⚠️ 当前为演示模式。请将 API_BASE 替换为实际后端接口地址。');
        }

        // ==================== 入口 ====================
        var queryCode = getQueryParam('code') || getQueryParam('id') || getQueryParam('fileNo');
        queryVerifyData(queryCode);

        // ==================== WeChat JS-SDK 兼容（可选） ====================
        // 如果需要在微信中隐藏分享按钮等，可引入 wx.config
        if (typeof window.WeixinJSBridge !== 'undefined') {
            document.addEventListener('WeixinJSBridgeReady', function() {
                // 微信环境就绪，可在此调用微信 JS-SDK
                console.log('WeChat JS-SDK ready');
            }, false);
        }
    })();
    </script>
</body>
</html>
